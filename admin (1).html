<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoworkClub Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

/* ── THEMES ── */
:root{
  --bg:#0d1b2a;--bg2:#132236;--bg3:#1a2e47;--surface:#1e3652;
  --border:rgba(255,255,255,0.08);
  --accent:#c9a84c;--accent2:#e8c96b;
  --text:#f0ead8;--text2:#9aafbe;--text3:#5a7488;
  --nav-bg:rgba(13,27,42,0.96);
  --pill-bg:rgba(201,168,76,0.12);--pill-text:#c9a84c;
  --tab-act:rgba(201,168,76,0.13);
  --danger:#e63946;--success:#2da882;
}
[data-theme="fresh"]{
  --bg:#f7faf9;--bg2:#eef4f1;--bg3:#e3ede8;--surface:#fff;
  --border:rgba(0,0,0,0.08);--accent:#1a7a5e;--accent2:#2da882;
  --text:#0d2b22;--text2:#4a7060;--text3:#8aaa9a;
  --nav-bg:rgba(247,250,249,0.96);
  --pill-bg:rgba(26,122,94,0.1);--pill-text:#1a7a5e;
  --tab-act:rgba(26,122,94,0.08);
}
[data-theme="bold"]{
  --bg:#080808;--bg2:#101010;--bg3:#181818;--surface:#1c1c1c;
  --border:rgba(255,255,255,0.06);--accent:#e63946;--accent2:#ff6b74;
  --text:#f8f8f8;--text2:#888;--text3:#444;
  --nav-bg:rgba(8,8,8,0.97);
  --pill-bg:rgba(230,57,70,0.1);--pill-text:#e63946;
  --tab-act:rgba(230,57,70,0.08);
}

body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden}

/* ── LOGIN PAGE ── */
#loginPage{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--bg);
}
.login-box{
  background:var(--bg2);border:1px solid var(--border);
  width:100%;max-width:400px;padding:2.5rem;
}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:2rem}
.login-logo-icon{width:40px;height:40px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:900;font-size:1.2rem;color:var(--bg)}
.login-logo-text{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:900}
.login-title{font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:1.5rem}
.form-group{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1rem}
.form-group label{font-size:.72rem;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}
.form-group input,.form-group select,.form-group textarea{
  padding:.65rem .9rem;background:var(--bg3);border:1px solid var(--border);
  color:var(--text);font-family:'Outfit',sans-serif;font-size:.85rem;
  outline:none;transition:border-color .2s;width:100%;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group input::placeholder,.form-group textarea::placeholder{color:var(--text3)}
.form-group textarea{min-height:80px;resize:vertical}
.btn{
  padding:.65rem 1.4rem;font-family:'Outfit',sans-serif;font-size:.78rem;
  font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;transition:opacity .2s,transform .15s;border:none;
}
.btn:hover{opacity:.85;transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-primary{background:var(--accent);color:var(--bg)}
.btn-danger{background:var(--danger);color:#fff}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:.35rem .8rem;font-size:.7rem}
.msg{font-size:.78rem;min-height:1.2rem;margin-top:.5rem}
.msg.ok{color:var(--success)}
.msg.err{color:var(--danger)}

/* ── ADMIN LAYOUT ── */
#adminPage{display:none;min-height:100vh}
.admin-wrap{display:flex;min-height:100vh;padding-top:56px}

/* Top bar */
.admin-topbar{
  position:fixed;top:0;left:0;right:0;height:56px;z-index:200;
  background:var(--nav-bg);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.5rem;
}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-logo{width:30px;height:30px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:900;font-size:.9rem;color:var(--bg)}
.topbar-title{font-size:.82rem;font-weight:600;color:var(--text)}
.topbar-sub{font-size:.62rem;color:var(--accent);letter-spacing:.08em;text-transform:uppercase}
.topbar-right{display:flex;align-items:center;gap:.75rem}
.topbar-user{font-size:.75rem;color:var(--text2)}
.topbar-user span{color:var(--accent);font-weight:600}
.theme-switcher{display:flex;gap:5px}
.tbtn{width:18px;height:18px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .2s,border-color .2s}
.tbtn:hover{transform:scale(1.2)}
.tbtn.on{border-color:var(--text)}
.tbtn[data-t="dark"] {background:linear-gradient(135deg,#0d1b2a,#c9a84c)}
.tbtn[data-t="fresh"]{background:linear-gradient(135deg,#f7faf9,#1a7a5e)}
.tbtn[data-t="bold"] {background:linear-gradient(135deg,#080808,#e63946)}

/* Sidebar */
.admin-sidebar{
  width:220px;flex-shrink:0;background:var(--bg2);
  border-right:1px solid var(--border);
  position:fixed;top:56px;bottom:0;left:0;
  overflow-y:auto;padding:1rem 0;
}
.sidebar-section{font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding:.75rem 1.2rem .3rem}
.sidebar-item{
  display:flex;align-items:center;gap:9px;
  padding:.55rem 1.2rem;cursor:pointer;
  font-size:.8rem;color:var(--text2);
  transition:background .15s,color .15s;border:none;
  background:transparent;width:100%;text-align:left;
  font-family:'Outfit',sans-serif;
}
.sidebar-item:hover{background:var(--bg3);color:var(--text)}
.sidebar-item.active{background:var(--tab-act);color:var(--accent);font-weight:600}
.sidebar-item .si-icon{font-size:.95rem;width:18px;text-align:center}
.sidebar-badge{margin-left:auto;background:var(--accent);color:var(--bg);font-size:.58rem;font-weight:700;padding:.1rem .4rem;border-radius:2px}

/* Main content */
.admin-main{margin-left:220px;flex:1;padding:1.5rem 2rem;min-height:calc(100vh - 56px)}

/* ── DASHBOARD STATS ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--surface);border:1px solid var(--border);padding:1.2rem;text-align:center}
.stat-num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:var(--accent);line-height:1}
.stat-label{font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:.4rem}

/* ── SECTION HEADER ── */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;flex-wrap:wrap;gap:.5rem}
.section-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:900}
.section-sub{font-size:.75rem;color:var(--text3);margin-top:.15rem}

/* ── DATA TABLE ── */
.tbl-wrap{overflow-x:auto;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.8rem}
thead tr{background:var(--bg3)}
th{padding:.7rem 1rem;text-align:left;font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border)}
td{padding:.65rem 1rem;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3);color:var(--text)}
.td-actions{display:flex;gap:.4rem;white-space:nowrap}
.badge{display:inline-block;font-size:.6rem;font-weight:700;padding:.18rem .5rem;letter-spacing:.06em;text-transform:uppercase}
.badge-active{background:rgba(45,168,130,.15);color:var(--success);border:1px solid var(--success)}
.badge-inactive{background:rgba(230,57,70,.1);color:var(--danger);border:1px solid var(--danger)}
.badge-role{background:var(--pill-bg);color:var(--pill-text);border:1px solid var(--accent)}

/* ── FORM PANEL ── */
.form-panel{background:var(--bg2);border:1px solid var(--border);padding:1.5rem;margin-bottom:1.5rem;display:none}
.form-panel.open{display:block}
.form-panel-title{font-size:.9rem;font-weight:600;margin-bottom:1.2rem;display:flex;align-items:center;gap:.5rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
@media(max-width:700px){.form-row,.form-row-3{grid-template-columns:1fr}}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:3rem;color:var(--text3);font-size:.85rem}

/* ── CONFIRM DIALOG ── */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:600;display:none;align-items:center;justify-content:center}
.confirm-overlay.open{display:flex}
.confirm-box{background:var(--bg2);border:1px solid var(--border);padding:1.8rem;max-width:380px;width:100%;text-align:center}
.confirm-box h4{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:900;margin-bottom:.75rem}
.confirm-box p{font-size:.82rem;color:var(--text2);margin-bottom:1.4rem}
.confirm-actions{display:flex;gap:.75rem;justify-content:center}

/* ── LOADING ── */
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-row td{text-align:center;padding:2rem;color:var(--text3)}

/* ── IMAGE UPLOAD WIDGET ── */
.img-upload-wrap{display:flex;flex-direction:column;gap:.5rem}
.img-upload-row{display:flex;gap:.5rem;align-items:stretch}
.img-upload-row input[type="text"]{flex:1}
.upload-btn{
  display:flex;align-items:center;gap:5px;
  padding:.5rem .9rem;background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);font-family:'Outfit',sans-serif;font-size:.72rem;
  font-weight:600;cursor:pointer;white-space:nowrap;transition:border-color .2s,color .2s;
}
.upload-btn:hover{border-color:var(--accent);color:var(--accent)}
.upload-btn:disabled{opacity:.5;cursor:not-allowed}
.upload-progress{
  font-size:.72rem;color:var(--text3);display:none;align-items:center;gap:6px;
}
.upload-progress.show{display:flex}
.upload-preview{
  width:100%;height:100px;object-fit:cover;
  border:1px solid var(--border);display:none;margin-top:.25rem;
}
.upload-preview.show{display:block}
/* hidden file inputs */
input[type="file"].hidden-file{display:none}

/* scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg3)}
</style>
</head>
<body data-theme="dark">

<!-- ══ LOGIN PAGE ══ -->
<div id="loginPage">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">A</div>
      <div class="login-logo-text">CoworkClub</div>
    </div>

    <div class="msg" id="liMsg"></div>
    <div style="margin-top:1.2rem;text-align:center">
      <a href="index.html" style="font-size:.75rem;color:var(--text3);text-decoration:none">← Back to CoworkClub</a>
    </div>
  </div>
</div>

<!-- ══ ADMIN PAGE ══ -->
<div id="adminPage">

  <!-- Top Bar -->
  <div class="admin-topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">A</div>
      <div>
        <div class="topbar-title">CoworkClub Admin</div>
        <div class="topbar-sub" id="topbarRole">Loading…</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="topbar-user">Signed in as <span id="topbarName"></span></div>
      <div class="theme-switcher">
        <div class="tbtn on" data-t="dark"  onclick="setTheme('dark',this)"></div>
        <div class="tbtn"    data-t="fresh" onclick="setTheme('fresh',this)"></div>

      </div>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Sign Out</button>

  <div class="admin-wrap">

      <button class="sidebar-item" onclick="showSection('clubs')">

        <span class="si-icon">📂</span> Categories

      <button class="sidebar-item" onclick="showSection('products')">

      </button>
      <button class="sidebar-item" onclick="showSection('prod_images')">
        <span class="si-icon">🖼️</span> Product Images
      </button>
      <button class="sidebar-item" onclick="showSection('prod_users')">
        <span class="si-icon">👥</span> Members
      </button>

      <div class="sidebar-section">Marketplace</div>
      <button class="sidebar-item" onclick="showSection('shops')">
        <span class="si-icon">🛍️</span> Shops
      </button>
      <button class="sidebar-item" onclick="showSection('shop_images')">
        <span class="si-icon">🖼️</span> Shop Images
      </button>

        <span class="si-icon">🔗</span> Shop Products
      </button>

      <div class="sidebar-section">Users</div>
      <button class="sidebar-item" onclick="showSection('users')">
        <span class="si-icon">👤</span> Users
      </button>
      <button class="sidebar-item" onclick="showSection('user_profiles')">
        <span class="si-icon">🎓</span> Mentor Profiles
      </button>

    <!-- Main -->
    <div class="admin-main" id="adminMain">
      <div class="empty"><span class="spinner"></span> Loading…</div>
    </div>

  </div>
</div>

<!-- ══ CONFIRM DIALOG ══ -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h4>Confirm Delete</h4>
    <p id="confirmMsg">Are you sure you want to delete this record?</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" id="confirmOkBtn">Delete</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ══════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════
const SB_URL  = 'https://czacuvklmuzvtzkvazhc.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6YWN1dmtsbXV6dnR6a3ZhemhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4OTkzOTMsImV4cCI6MjA4OTQ3NTM5M30.PheGFbsV1gTbih7zZmXuFgFQFtnEfIDKwxyE_eqYSnM';
const _db = window.supabase.createClient(SB_URL, SB_ANON);

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let adminUser    = null;
let isSuperAdmin = false;
let currentSection = 'dashboard';
// Cache for dropdowns
let _clubs = [], _categories = [], _products = [], _shops = [], _users = [];

// ══════════════════════════════════════════════
//  THEME
// ══════════════════════════════════════════════
function setTheme(t, btn){
  document.body.setAttribute('data-theme', t);
  document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  localStorage.setItem('cwc_theme', t);
}
const _savedTheme = localStorage.getItem('cwc_theme');
if(_savedTheme) document.body.setAttribute('data-theme', _savedTheme);

// ══════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════
async function doLogin(){
  const btn   = document.getElementById('liBtn');
  const msg   = document.getElementById('liMsg');
  const email = document.getElementById('liEmail').value.trim();
  const pass  = document.getElementById('liPass').value;
  if(!email||!pass){ msg.textContent='Please fill in all fields'; msg.className='msg err'; return; }
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Signing in…';
  try {
    const { data, error } = await _db.from('users').select('*')
      .eq('email', email).eq('password', pass).limit(1);
    if(error) throw error;
    if(!data || !data.length){
      msg.textContent = 'Invalid email or password'; msg.className='msg err';
      btn.disabled = false; btn.textContent = 'Sign In'; return;
    }
    const user = data[0];
    if(!['superadmin','clubadmin'].includes(user.role)){
      msg.textContent = 'Access denied — admin role required'; msg.className='msg err';
      btn.disabled = false; btn.textContent = 'Sign In'; return;
    }
    adminUser    = user;
    isSuperAdmin = user.role === 'superadmin';
    localStorage.setItem('cwc_admin', JSON.stringify(user));
    enterAdmin();
  } catch(e){
    msg.textContent = e.message; msg.className='msg err';
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

function doLogout(){
  localStorage.removeItem('cwc_admin');
  adminUser = null;
  document.getElementById('adminPage').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
}

function enterAdmin(){
  document.getElementById('loginPage').style.display  = 'none';
  document.getElementById('adminPage').style.display  = 'block';
  document.getElementById('topbarName').textContent   = adminUser.name || adminUser.email;
  document.getElementById('topbarRole').textContent   = isSuperAdmin ? 'Super Admin' : 'Club Admin';
  loadCaches().then(() => showSection('dashboard'));
}

// Restore session
const _savedAdmin = localStorage.getItem('cwc_admin');
if(_savedAdmin){
  try {
    adminUser    = JSON.parse(_savedAdmin);
    isSuperAdmin = adminUser.role === 'superadmin';
    document.addEventListener('DOMContentLoaded', ()=>{
      if(adminUser) enterAdmin();
    });
  } catch(e){ localStorage.removeItem('cwc_admin'); }
}

// ══════════════════════════════════════════════
//  CACHE LOOKUPS (for dropdowns)
// ══════════════════════════════════════════════
async function loadCaches(){
  try {
    let cq = _db.from('clubs').select('club_id,club_name,flag_emoji');
    if(!isSuperAdmin) cq = cq.eq('club_id', adminUser.club_id);
    const { data: clubs } = await cq;
    _clubs = clubs || [];

    const { data: cats  } = await _db.from('product_categories').select('category_id,category_name,club_id');
    _categories = (cats || []).filter(c => isSuperAdmin || c.club_id === adminUser.club_id);

    const { data: prods } = await _db.from('products').select('product_id,product_name,club_id');
    _products = (prods || []).filter(p => isSuperAdmin || p.club_id === adminUser.club_id);

    const { data: shps  } = await _db.from('shops').select('shop_id,shop_name,club_id');
    _shops = (shps || []).filter(s => isSuperAdmin || s.club_id === adminUser.club_id);

    const { data: usrs  } = await _db.from('users').select('user_id,name,email');
    _users = usrs || [];
  } catch(e){ console.warn('Cache load:', e.message); }
}

function clubName(id){ return _clubs.find(c=>c.club_id===id)?.club_name || id?.slice(0,8)+'…' || '—'; }
function catName(id){ return _categories.find(c=>c.category_id===id)?.category_name || id?.slice(0,8)+'…' || '—'; }
function prodName(id){ return _products.find(p=>p.product_id===id)?.product_name || id?.slice(0,8)+'…' || '—'; }
function shopName(id){ return _shops.find(s=>s.shop_id===id)?.shop_name || id?.slice(0,8)+'…' || '—'; }
function userName(id){ const u=_users.find(u=>u.user_id===id); return u ? (u.name||u.email) : id?.slice(0,8)+'…' || '—'; }

function clubOpts(sel=''){
  return _clubs.map(c=>`<option value="${c.club_id}" ${c.club_id===sel?'selected':''}>${c.flag_emoji||''} ${c.club_name}</option>`).join('');
}
function catOpts(sel='', clubId=''){

function setMain(html){ document.getElementById('adminMain').innerHTML = html; }

async function fetchRows(table, filters={}){
  let q = _db.from(table).select('*');
  Object.entries(filters).forEach(([k,v])=>{ q = q.eq(k,v); });
  const { data, error } = await q;
  if(error) throw error;
  return data || [];
}

async function deleteRow(table, pkCol, pkVal, reloadFn){
  const { error } = await _db.from(table).delete().eq(pkCol, pkVal);
  if(error){ alert('Delete error: ' + error.message); return; }
  await loadCaches();
  reloadFn();
}

  setMain(`<div class="empty"><span class="spinner"></span> Loading…</div>`);
  try {
    const { data: rows, error } = await _db.from('user_profiles').select('*');
    if(error) throw error;
    setMain(`
      <div class="section-header">
        <div><div class="section-title">Mentor Profiles</div><div class="section-sub">${(rows||[]).length} profiles</div></div>
        <button class="btn btn-primary btn-sm" onclick="openProfileForm()">+ Add Profile</button>
      </div>
      <div class="form-panel" id="profileForm">
        <div class="form-panel-title">✏️ <span id="profileFormTitle">Add Mentor Profile</span></div>
        <div class="form-group"><label>User</label><select id="prUser"><option value="">— Select User —</option>${_users.map(u=>`<option value="${u.user_id}">${u.name||u.email}</option>`).join('')}</select></div>
        <div class="form-row">
          <div class="form-group"><label>Tagline</label><input id="prTagline" placeholder="e.g. AI & Productivity Coach"/></div>
          <div class="form-group"><label>Experience (years)</label><input type="number" id="prExp" placeholder="5"/></div>
        </div>
        <div class="form-group"><label>Bio</label><textarea id="prBio" style="min-height:100px" placeholder="About this mentor…"></textarea></div>
        <div class="form-row">
          <div class="form-group"><label>Skills (comma separated)</label><input id="prSkills" placeholder="Python, AI, Design"/></div>
          <div class="form-group"><label>Rate per Hour (₹)</label><input type="number" id="prRate" placeholder="500"/></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Availability</label>
            <select id="prAvail"><option value="anytime">Anytime</option><option value="weekends">Weekends</option><option value="evenings">Evenings</option></select>
          </div>
          <div class="form-group"><label>Is Mentor</label>
            <select id="prMentor"><option value="true">Yes</option><option value="false">No</option></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>LinkedIn URL</label><input id="prLinkedin" placeholder="https://linkedin.com/in/…"/></div>
          <div class="form-group"><label>Website URL</label><input id="prWebsite" placeholder="https://…"/></div>
        </div>
        <div style="display:flex;gap:.75rem;align-items:center">
          <button class="btn btn-primary" onclick="saveProfile()">Save</button>
          <button class="btn btn-ghost" onclick="closeForm('profileForm')">Cancel</button>
          <span class="msg" id="prMsg"></span>
        </div>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>User</th><th>Tagline</th><th>Mentor</th><th>Rate/hr</th><th>Availability</th><th>Actions</th></tr></thead>
          <tbody>${(rows||[]).map(r=>`
            <tr>
              <td style="font-weight:500;color:var(--text)">${userName(r.user_id)}</td>
              <td>${r.tagline||'—'}</td>
              <td>${r.is_mentor?'<span class="badge badge-active">Yes</span>':'<span class="badge badge-inactive">No</span>'}</td>
              <td>${r.rate_per_hr?'₹'+r.rate_per_hr:' Free'}</td>
              <td>${r.availability||'—'}</td>
              <td class="td-actions">
                <button class="btn btn-ghost btn-sm" onclick='editProfile(${JSON.stringify(r)})'>Edit</button>
                <button class="btn btn-danger btn-sm" onclick="confirmDelete('user_profiles','user_id','${r.user_id}',showUserProfiles)">Delete</button>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`);
  } catch(e){ setMain(`<div class="empty">Error: ${e.message}</div>`); }
}

function openProfileForm(){ document.getElementById('profileFormTitle').textContent='Add Profile'; ['prTagline','prBio','prSkills','prLinkedin','prWebsite'].forEach(id=>document.getElementById(id).value=''); document.getElementById('prExp').value=''; document.getElementById('prRate').value=''; document.getElementById('prAvail').value='anytime'; document.getElementById('prMentor').value='true'; document.getElementById('profileForm').classList.add('open'); }
function editProfile(r){ document.getElementById('profileFormTitle').textContent='Edit Profile'; document.getElementById('prUser').value=r.user_id||''; document.getElementById('prTagline').value=r.tagline||''; document.getElementById('prBio').value=r.bio||''; document.getElementById('prSkills').value=(r.skills||[]).join(', '); document.getElementById('prExp').value=r.experience_yr||''; document.getElementById('prRate').value=r.rate_per_hr||''; document.getElementById('prAvail').value=r.availability||'anytime'; document.getElementById('prMentor').value=String(r.is_mentor||false); document.getElementById('prLinkedin').value=r.linkedin_url||''; document.getElementById('prWebsite').value=r.website_url||''; document.getElementById('profileForm').classList.add('open'); }
async function saveProfile(){
  const msg=document.getElementById('prMsg');
  const userId=document.getElementById('prUser').value;
  const skillsRaw=document.getElementById('prSkills').value;
  const payload={ user_id:userId, tagline:document.getElementById('prTagline').value.trim(), bio:document.getElementById('prBio').value.trim(), skills:skillsRaw?skillsRaw.split(',').map(s=>s.trim()).filter(Boolean):[], experience_yr:parseInt(document.getElementById('prExp').value)||null, rate_per_hr:parseFloat(document.getElementById('prRate').value)||null, availability:document.getElementById('prAvail').value, is_mentor:document.getElementById('prMentor').value==='true', linkedin_url:document.getElementById('prLinkedin').value.trim(), website_url:document.getElementById('prWebsite').value.trim(), updated_at:new Date().toISOString() };
  if(!userId){ msg.textContent='User required'; msg.className='msg err'; return; }
  msg.textContent='Saving…'; msg.className='msg';
  const { error } = await _db.from('user_profiles').upsert(payload, {onConflict:'user_id'});
  if(error){ msg.textContent=error.message; msg.className='msg err'; return; }
  closeForm('profileForm'); showUserProfiles();
}

function closeForm(id){ document.getElementById(id).classList.remove('open'); }

function confirmDelete(table, pkCol, pkVal, reloadFn){
  openConfirm(`Delete this record from ${table}?`, ()=> deleteRow(table, pkCol, pkVal, reloadFn));
}

//  IMAGE UPLOAD — Supabase Storage
// ══════════════════════════════════════════════
const BUCKET = 'coworkclub-media';
const SB_STORAGE_URL = `${SB_URL}/storage/v1/object/${BUCKET}`;
const SB_STORAGE_PUB = `${SB_URL}/storage/v1/object/public/${BUCKET}`;

function triggerUpload(fileInputId){
  document.getElementById(fileInputId).click();
}

async function uploadImage(fileInput, urlFieldId, previewId, progressId, folder){
  const file = fileInput.files[0];
  if(!file) return;

  // Show progress
  const prog = document.getElementById(progressId);
  const prev = document.getElementById(previewId);
  prog.classList.add('show');
  prev.classList.remove('show');

  try {
    // Unique filename: folder/timestamp-originalname
    const ext      = file.name.split('.').pop().toLowerCase();
    const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    const path     = `${folder}/${Date.now()}-${safeName}`;

    // Upload via fetch (works with anon key for public bucket)
    const res = await fetch(`${SB_STORAGE_URL}/${path}`, {
      method:  'POST',
      headers: {
        'Authorization': `Bearer ${SB_ANON}`,
        'Content-Type':  file.type,
        'x-upsert':      'true'
      },
      body: file
    });

    if(!res.ok){
      const err = await res.json().catch(()=>({message: res.statusText}));
      throw new Error(err.message || 'Upload failed');
    }

    // Build public URL
    const publicUrl = `${SB_STORAGE_PUB}/${path}`;

    // Fill URL field + show preview
    document.getElementById(urlFieldId).value = publicUrl;
    prev.src = publicUrl;
    prev.classList.add('show');
    prog.classList.remove('show');

    // Reset file input
    fileInput.value = '';

  } catch(e){
    prog.classList.remove('show');
    alert('Upload error: ' + e.message);
  }
}

// Reset upload widget helper
function resetUploadWidget(urlId, previewId, progressId){
  const prev = document.getElementById(previewId);
  const prog = document.getElementById(progressId);
  if(prev){ prev.src=''; prev.classList.remove('show'); }
  if(prog){ prog.classList.remove('show'); }
}

// Show preview when editing existing image
function showExistingPreview(url, previewId){
  const prev = document.getElementById(previewId);
  if(prev && url){ prev.src=url; prev.classList.add('show'); }
  else if(prev){ prev.src=''; prev.classList.remove('show'); }
}
